openapi: 3.1.0
info:
  title: user_service
  description: ''
  license:
    name: ''
  version: 0.1.0
paths:
  /users/create:
    post:
      tags:
      - users
      operationId: create_user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
        required: true
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreatedResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}:
    get:
      tags:
      - users
      operationId: get_user_by_id
      parameters:
      - name: id
        in: path
        description: User's unique identifier
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: User found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
    UserCreatedResponse:
      type: object
      required:
      - id
      properties:
        id:
          type: string
          format: uuid
    UserDto:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    UserUpdateRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
tags:
- name: users
  description: User management endpoints
