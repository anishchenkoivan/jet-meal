services:
  postgres:
    image: postgres:16-alpine
    container_name: businesses_test_env_jet_meal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jetmeal
      POSTGRES_PASSWORD: jetmealpass
      POSTGRES_DB: jetmeal_businesses
    # Non persistent test state
    # volumes:
      # - postgres_data:/var/lib/postgresql/data

  businesses-service:
    container_name: businesses_test_env_jet_meal_businesses
    depends_on:
      - postgres
    build:
      context: ../../..
      dockerfile: services/businesses/Dockerfile
      args:
        SANITIZER: 1
    environment:
      BUSINESSES_PORT: 18080
      BUSINESSES_POSTGRES_DSN: "postgres://jetmeal:jetmealpass@postgres:5432/jetmeal_businesses?sslmode=disable"
    ports:
      - "127.0.0.1:18080:18080"

volumes:
  postgres_data:
